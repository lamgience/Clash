# ==============================================================================
# Clash Verge / Mihomo 旗舰级配置文件 [全量完整版]
# ==============================================================================

# ------------------------------------------------------------------------------
# 1. 核心与内核设置 (Core & Kernel)
# ------------------------------------------------------------------------------
mode: rule
mixed-port: 7897
allow-lan: true
bind-address: "*"
log-level: info
ipv6: true
external-controller: 127.0.0.1:9090
secret: ""
external-controller-pipe: \\.\pipe\verge-mihomo
unified-delay: true
keep-alive-interval: 1800
ntp-server: ntp.aliyun.com

profile:
  store-selected: true

tcp-concurrent: true
find-process-mode: strict
global-client-fingerprint: chrome

geodata-mode: true
geo-auto-update: true
geo-update-interval: 24
geox-url:
  geoip: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geoip.dat"
  geosite: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/geosite.dat"
  mmdb: "https://testingcf.jsdelivr.net/gh/MetaCubeX/meta-rules-dat@release/country.mmdb"

# ------------------------------------------------------------------------------
# 2. 本地 Hosts 映射 (Local Hosts)
# ------------------------------------------------------------------------------
hosts:
  "router.asus.com": 192.168.50.1
  "mtalk.google.com": 108.177.125.188
  "services.googleapis.com": 172.217.163.42
  "flash.cn": 127.0.0.1

# ------------------------------------------------------------------------------
# 3. TUN 透明代理配置
# ------------------------------------------------------------------------------
tun:
  enable: true
  stack: mixed
  auto-route: true
  auto-detect-interface: true
  dns-hijack: ["any:53"]
  mtu: 1500

# ------------------------------------------------------------------------------
# 4. DNS 深度优化 (Split-DNS)
# ------------------------------------------------------------------------------
dns:
  enable: true
  listen: :53
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter-mode: blacklist
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "*.arpa"
    - "time.*.com"
    - "ntp.*.com"
    - "+.pool.ntp.org"
    - "stun.*"
    - "+.stun.*.*"
    - "+.stun.*"
    - "+.ice.*.*"
    - "xbox.*.com"
    - "xboxlive.com"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "www.msftconnecttest.com"
    - "+.market.xiaomi.com"
    - "localhost.ptlogin2.qq.com"
    - "+.360.cn"
    - "+.system.apple.com"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 8.8.8.8
  fallback: []
  fallback-filter:
    geoip: true
    geoip-code: CN
    ipcidr: [240.0.0.0/4]
  nameserver-policy:
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://dns.google/dns-query
      - https://1.1.1.1/dns-query

# ------------------------------------------------------------------------------
# 4. 流量嗅探 (Sniffer)
# ------------------------------------------------------------------------------
sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  override-destination: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443, 3478, 19302]
  skip-domain:
    - "Mijia Cloud"
    - "dlg.io.mi.com"
    - "+.apple.com"
    - "apple.com"
    - "+.push.apple.com"
    - "+.icloud.com"
    - "+.system.apple.com"
    - "+.c.163.com"
    - "+.music.126.net"
    - "*.122.com"
    - "localhost"
    - "*.local"
    - "*.lan"

# ------------------------------------------------------------------------------
# 5. 配置锚点与模板 (Anchors)
# ------------------------------------------------------------------------------
p: &common_filter
  include-all: true
  exclude-filter: "(?i)Traffic|Expire|Premium|频道|订阅|ISP|流量|到期|重置|请勿|剩余|套餐|跳转|官网|运营|更新"

pg_auto: &pg_auto
  - 自动选择
  - 节点选择
  - 手动切换
  - 香港节点
  - 台湾节点
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 英国节点
  - 韩国节点
  - 澳大利亚节点
  - 俄罗斯节点
  - 其他节点
  - DIRECT

pg_ai: &pg_ai
  - 美国节点
  - 日本节点
  - 新加坡节点
  - 手动切换
  - 自动选择
  - 节点选择
  - 香港节点
  - 台湾节点
  - 英国节点
  - 韩国节点
  - 澳大利亚节点
  - 俄罗斯节点
  - 其他节点
  - DIRECT

